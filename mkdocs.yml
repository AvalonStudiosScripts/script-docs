site_name: AvalonStudios Script Docs
site_description: Documentazione ufficiale degli script FiveM di AvalonStudios
site_author: AvalonStudiosScripts
site_url: https://AvalonStudiosScripts.github.io/script-docs

theme:
  name: material
  language: it
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Tema chiaro
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Tema scuro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/logo.png

repo_name: AvalonStudiosScripts/script-docs
repo_url: https://github.com/AvalonStudiosScripts/script-docs

extra:
  alternate:
    - name: 🇮🇹 Italiano
      link: /script-docs/
      lang: it
    - name: 🇬🇧 English
      link: /script-docs/en/
      lang: en
    - name: 🇪🇸 Español
      link: /script-docs/es/
      lang: es
    - name: 🇵🇹 Português
      link: /script-docs/pt/
      lang: pt
    - name: 🇨🇳 中文
      link: /script-docs/zh/
      lang: zh
    - name: 🇹🇭 ภาษาไทย
      link: /script-docs/th/
      lang: th
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AvalonStudiosScripts

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: [it, en, es, pt, zh]

nav:
  - Home: index.md
  - Script:
    - Panoramica: scripts/index.md
    - avalon_coltivation: scripts/coltivation.md
    - avalon_dustman: scripts/dustman.md
    - avalon_electrician: scripts/electrician.md
    - avalon_lumberjack: scripts/lumberjack.md
    - avalon_mining: scripts/mining.md
    - avalon_robbery: scripts/robbery.md
    - avalon_trash: scripts/trash.md
